<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koga Car Dealership</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0a0d14',
                        cardDark: '#111621',
                        brandRed: '#c8102e',
                        lightGray: '#f8f9fa',
                        borderGray: '#eaecf0'
                    }
                }
            }
        }
    </script>
    <style>
        .hero-bg {
            background: radial-gradient(circle at 80% 50%, rgba(200, 16, 46, 0.15) 0%, rgba(10, 13, 20, 1) 50%);
        }
        #main-header { transition: all 0.3s ease-in-out; }
        .header-scrolled { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #mobile-menu {
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0; opacity: 0; overflow: hidden;
        }
        #mobile-menu.open { max-height: 500px; opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased overflow-x-hidden">

    <header id="main-header" class="fixed top-0 w-full z-50 bg-white border-b border-gray-100">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center bg-white">
            <a href="#" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brandRed rounded-br-xl rounded-tl-xl flex items-center justify-center text-white font-black text-2xl italic shadow-md">K</div>
                <div class="flex flex-col leading-none">
                    <span class="text-xl font-black tracking-wider text-gray-900">KOGA</span>
                    <span class="text-[10px] tracking-[0.2em] text-gray-500 uppercase font-bold">Dealership</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center gap-8 text-sm font-medium">
                <a href="#" class="text-brandRed">Home</a>
                <a href="#" class="hover:text-brandRed">Inventory</a>
                <a href="#" class="hover:text-brandRed">Services</a>
            </div>
            <button id="mobile-menu-btn" class="lg:hidden p-2 text-gray-800"><i class="fa-solid fa-bars text-xl"></i></button>
        </nav>
    </header>

    <section class="bg-dark text-white hero-bg relative pt-28 pb-16 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center">
            <div class="w-full md:w-1/2 text-center md:text-left">
                <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-4">Drive Quality.<br><span class="text-brandRed">Trust Koga.</span></h1>
                <p class="text-gray-400 mb-6 max-w-sm mx-auto md:mx-0">Find your dependable daily driver with our transparent service.</p>
                <button class="bg-brandRed text-white px-8 py-3 rounded-md font-semibold">Explore Inventory</button>
            </div>
            <div class="hidden md:block w-1/2">
                <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?q=80&w=800" alt="Hero Car" class="w-full object-contain opacity-90">
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-16 px-6">
        <h2 class="text-2xl font-bold mb-8">Shop By Brand</h2>
        <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Toyota.svg" alt="Toyota" class="max-h-full object-contain">
            </div>
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_Logo.svg" alt="Honda" class="max-h-full object-contain">
            </div>
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Ford_Motor_Company_Logo.svg" alt="Ford" class="max-h-full object-contain">
            </div>
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Nissan_2020_logo.svg" alt="Nissan" class="max-h-full object-contain">
            </div>
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Hyundai_Motor_Company_logo.svg" alt="Hyundai" class="max-h-full object-contain">
            </div>
            <div class="h-24 flex items-center justify-center border border-gray-200 bg-white rounded-xl shadow-sm hover:shadow-lg transition p-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/KIA_logo2.svg" alt="Kia" class="max-h-full object-contain">
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-16 px-6">
        <h2 class="text-2xl font-bold mb-8">Featured Vehicles</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-xl overflow-hidden border border-gray-200 shadow-md">
                <img src="https://images.unsplash.com/photo-1550314418-9c5950d2c16d?q=80&w=600" class="w-full h-48 object-cover" alt="Toyota">
                <div class="p-6"><h4 class="font-bold text-lg">Toyota Corolla LE 2020</h4><p class="text-brandRed font-black">$18,500</p></div>
            </div>
            <div class="bg-white rounded-xl overflow-hidden border border-gray-200 shadow-md">
                <img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=600" class="w-full h-48 object-cover" alt="Honda">
                <div class="p-6"><h4 class="font-bold text-lg">Honda Civic EX 2019</h4><p class="text-brandRed font-black">$19,200</p></div>
            </div>
            <div class="bg-white rounded-xl overflow-hidden border border-gray-200 shadow-md">
                <img src="https://images.unsplash.com/photo-1542362567-b07e54358753?q=80&w=600" class="w-full h-48 object-cover" alt="Hyundai">
                <div class="p-6"><h4 class="font-bold text-lg">Hyundai Elantra SEL 2021</h4><p class="text-brandRed font-black">$17,900</p></div>
            </div>
        </div>
    </section>

    <footer class="bg-cardDark text-white py-8 text-center text-sm text-gray-500 border-t border-gray-800">
        &copy; 2026 Koga Car Dealership.
    </footer>
</body>
</html>
